services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mos
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-db.sql:/docker-entrypoint-initdb.d/setup-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  embedding:
    build: ./python-service
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
    depends_on:
      - postgres
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:5000/embed",
          "-X",
          "POST",
          "-H",
          "Content-Type: application/json",
          "-d",
          '{"text":"test"}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/mos
      EMBEDDING_SERVICE_URL: http://embedding:5000
    depends_on:
      postgres:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
